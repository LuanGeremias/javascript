<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <script>
        let usu = prompt('Digite o nome de usuario:');
        let sen = parseInt(prompt('Digite a senha:'));

            alert('Acesso válido');
        }else{
            alert('Acesso inválido');
        }
    </script>
