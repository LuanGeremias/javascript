<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desepenho do aluno</title>
</head>
<body>
    <script>
        let n1 = parseFloat(prompt('Digite a nota:'));
        if(n1 <= 4){
            alert('Desempenho ruim')
        }else if(n1 <= 6){
            alert('Desempenho regular')
        }else if(n1 <= 8){
            alert('Desempenho bom')
        }else if(n1 <= 10){
            alert('Desempenho excelente')
        }

    </script>
</body>
</html>
