<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imparoupar</title>
</head>
<body>
    <script>
        let num = parseInt(prompt('Digite um número:'));
        if(num % 2 == 0){
            alert('Seu número é par');
        }else{
            alert('seu número é impar');
        }
    </script>
</body>
</html>
