<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>maior número</title>
</head>
<body>
    <script>
        let n1 = parseInt(prompt('Digite um número:'));
        let n2 = parseInt(prompt('Digite outro número:'));
        let n3 = parseInt(prompt('Digite mais um número:'));
        let maior = Math.max(n1, n2, n3);
        let menor = Math.min(n1, n2, n3);
        alert(`O maior número é ${maior} e o menor é ${menor}`)
    </script>
</body>
</html>
