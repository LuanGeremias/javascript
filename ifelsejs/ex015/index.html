<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC</title>
</head>
<body>
    <script>
        let alt = parseFloat(prompt('Digite sua altura: '));
        let peso = parseFloat(prompt('Digite seu peso: '));
        let imc = peso / Math.pow(alt,2);
        if(imc < 18.5){
            alert('Voce está abaixo do peso');
        }else if(imc < 25){
            alert('Peso normal');
        }else if(imc < 30){
            alert('Sobrepeso')
        }else{
            alert('Obsidade')
        }
    </script>
</body>
</html>
