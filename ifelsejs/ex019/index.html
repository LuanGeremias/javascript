<!DOCTYPE html>
<html lang="pt-bt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculo de desconto</title>
</head>
<body>
    <script>
        let valor = parseFloat(prompt('Digite o valor da compra:'));
        if(valor < 500){
            alert('Sem desconto');
        }else if(valor < 1000){
            let desconto = valor * 5 / 100;
            alert(`Sua compra com 5% de desconto fica por ${valor - desconto}`);
        }else{
            let desconto = valor * 10 / 100;
            alert(`Sua compra com 10% de desconto fica por ${valor - desconto}`);
        }
    </script>
</body>
</html>
