<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprovado e Reprovado</title>
</head>
<body>
    <script>
        let n1 = parseFloat(prompt('Digite sua nota:'));
        if(n1 >= 7){
            alert('Aprovado');
        }else{
            alert('Reprovado');
        }
    </script>
</body>
</html>
