<!DOCTYPE html>
<html lang="pt-">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maior de idade</title>
</head>
<body>
    <script>
        let idade = parseInt(prompt('Digite sua idade: '));
        if(idade >= 18){
            alert('Voce é maior de idade!')
        }else{
            alert('Voce é menor de idade')
        }
    </script>
</body>
</html>
