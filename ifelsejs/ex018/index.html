<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador</title>
</head>
<body>
    <script>
        const senha = prompt("Digite a senha:");
        const temMinimo = senha.length >= 8;
        const temLetra = /[a-zA-Z]/.test(senha);
        const temNumero = /\d/.test(senha);

        if(temMinimo && temLetra && temNumero) {
            console.log("Senha válida!");
        } else {
            console.log("Senha inválida. Deve ter no mínimo 8 caracteres, conter letra e número.");
        }
    </script>
</body>
</html>
