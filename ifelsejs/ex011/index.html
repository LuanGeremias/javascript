<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperatura</title>
</head>
<body>
    <script>
        let temp = parseFloat(prompt('Digite a temperatura:'));
        if(temp < 15){
            alert('Está fazendo frio');
        }else if(temp < 25){
            alert('Clima agradável');
        }else{
            alert('Esta fazendo frio');
        }
    </script>
</body>
</html>
