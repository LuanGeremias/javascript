<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="main.js"></script>
    <title>Formúlario</title>
</head>
<body>
    <div id="d1">
        <div id="cor"></div>
        <form action="" method="post">
            <div id="conteudo">
                <label>Nome </label> 
                <br>
                <input type="text" name="nome" id="inome" class="aumentar" placeholder="Seu Nome" autocomplete="name" required maxlength="30">
                <br>
                <label id="nomesenha">Senha </label>
                <br>
                <input type="password" name="senha" id="isenha" class="aumentar" placeholder="Sua senha" required maxlength="16">
                <br>
                <input type="submit" value="Enviar" id="enviar">
            </div>
        </form>
    </div>    
</body>
</html>
