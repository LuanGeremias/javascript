<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maior de Idade</title>
</head>
<body>
    <script>
        let idade = parseInt(prompt('Digite sua idade:'))
        if (idade >= 18){
            alert(`Com a idade ${idade}, você é maior de idade.`)
        }else{
            alert(`Com a idade ${idade}, você é menor de idade.`)
        }
    </script>
</body>
</html>
