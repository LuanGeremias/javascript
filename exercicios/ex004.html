<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalho de uma força</title>
</head>
<body>
    <script>
        let forca = Number(prompt('Digite a força:'));
        let dis = Number(prompt('Digite a distancia percorrida: '));
        let result = forca * dis;
        console.log('O trabalho feito é: ' + result);
    </script>
</body>
</html>
