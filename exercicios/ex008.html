<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numero maior que o outro</title>
</head>
<body>
    <script>
        let a = parseInt(prompt('Digite um número:'));
        let b = parseInt(prompt('Digite outro número:'));
        if(a > b){
            alert(`O número ${a} é maior que ${b}`);
        }else if(a < b){
            alert(`O número ${b} é maior que ${a}`);
        }else {
            alert(`Os números ${a} e ${b} são iguais`);
        }
    </script>
</body>
</html>
