<!DOCTYPE html>
<html lang="pt-br">
<head>

    <style>
        body {
            background-color: rgb(88, 113, 121);
            color: white;
            font: normal 1.5em arial;
        }
    </style>
</head>
<body>
    <h1>Iniciando estudos com DOW</h1>
