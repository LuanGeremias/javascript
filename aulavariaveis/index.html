<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiro projeto em JS</title>
</head>
<body>
    <h1>Estudando JS!</h1>
    <script>
        let num1 = parseInt(prompt("Digite um número: "));
        let num2 = parseInt(prompt("Digite outro número: "));

    </script>
